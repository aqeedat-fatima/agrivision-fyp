<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password – AgriVision</title>
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <h2>Reset Password</h2>
    <p>Enter your account email and choose a new password.</p>

    <label>Email</label>
    <input id="resetEmail" type="email" placeholder="Enter your email">

    <label>New Password</label>
    <input id="resetPassword" type="password" placeholder="New password">

    <button id="resetPasswordBtn">Reset Password</button>

    <p>
      Remembered your password?
      <a href="login.html">Back to login</a>
    </p>
  </div>
</div>

<script src="assets/js/forgot-password.js"></script>
</body>
</html>
