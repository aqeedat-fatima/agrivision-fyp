<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password – AgriVision</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/forgot-password.css" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">
        <img src="assets/images/agrivision-logo.png" alt="AgriVision">
      </div>

      <h1>Reset Password</h1>
      <p class="auth-subtitle">
        Enter your email and create a new password to regain access to your AgriVision account.
      </p>

      <div class="form-group">
        <label>Email Address</label>
        <input id="resetEmail" type="email" placeholder="e.g. aqeedat@email.com">
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input id="resetPassword" type="password" placeholder="Create a new password">
        <p class="input-hint">Use 6+ characters for better security.</p>
      </div>

      <button id="resetPasswordBtn" class="auth-btn" type="button">
        Reset Password
      </button>

      <p class="auth-footer">
        Remembered your password?
        <a href="login.html">Back to login</a>
      </p>
    </section>
  </main>

  <script src="assets/js/forgot-password.js"></script>
</body>
</html>
