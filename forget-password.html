<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriVision • Forgot Password</title>
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-sub">
      Enter your account email and create a new password.
    </p>

    <form id="forgotPasswordForm">

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="resetEmail" placeholder="e.g. aqeedat@email.com" required>
      </div>

      <div class="input-group">
        <label>New Password</label>
        <input type="password" id="resetPassword" placeholder="Create a new password" required>
        <small>Use 6+ characters for better security.</small>
      </div>

      <button type="submit" class="btn-primary">Reset Password</button>

      <p class="auth-link">
        Remembered your password?
        <a href="login.html">Back to login</a>
      </p>

    </form>
  </div>
</div>

<script src="assets/js/forgot-password.js"></script>
</body>
</html>
